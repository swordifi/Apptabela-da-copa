<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Placar Copa 2026 · Gols com nome do jogador</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    }

    body {
      background-color: #0b0f19;
      color: #f8fafc;
      padding: 15px;
      display: flex;
      justify-content: center;
    }

    .app-container {
      width: 100%;
      max-width: 520px;
      background: transparent;
    }

    header {
      text-align: center;
      padding: 20px 0;
      background: linear-gradient(135deg, #1e293b, #0f172a);
      border-radius: 24px;
      margin-bottom: 20px;
      border: 1px solid #334155;
      box-shadow: 0 4px 15px rgba(0,0,0,0.5);
    }

    header h1 {
      font-size: 26px;
      font-weight: 800;
      letter-spacing: 1px;
    }

    header h1 span {
      color: #ef4444;
    }

    /* Cronômetro e relógio digital */
    .clock-panel {
      background: #161f32;
      border-radius: 18px;
      padding: 14px 18px;
      margin-bottom: 20px;
      border: 1px solid #23324d;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 12px;
    }

    .digital-clock {
      font-size: 28px;
      font-weight: 700;
      letter-spacing: 2px;
      background: #0b0f19;
      padding: 6px 16px;
      border-radius: 40px;
      border: 1px solid #334155;
      color: #10b981;
      font-variant-numeric: tabular-nums;
    }

    .stopwatch-box {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .stopwatch-display {
      background: #0b0f19;
      padding: 6px 12px;
      border-radius: 40px;
      font-size: 24px;
      font-weight: 600;
      color: #f59e0b;
      border: 1px solid #334155;
      font-variant-numeric: tabular-nums;
      min-width: 95px;
      text-align: center;
    }

    .stopwatch-buttons {
      display: flex;
      gap: 6px;
    }

    .sw-btn {
      background: #23324d;
      border: none;
      color: white;
      font-size: 14px;
      font-weight: bold;
      padding: 6px 12px;
      border-radius: 30px;
      cursor: pointer;
      transition: 0.15s;
      border: 1px solid #334155;
    }

    .sw-btn:active { transform: scale(0.92); }
    .sw-btn.start { background: #10b981; border-color: #10b981; }
    .sw-btn.stop { background: #ef4444; border-color: #ef4444; }
    .sw-btn.reset { background: #f59e0b; border-color: #f59e0b; }

    /* estatísticas */
    .stats-dashboard {
      background: #161f32;
      border-radius: 16px;
      padding: 15px;
      margin-bottom: 20px;
      border: 1px solid #23324d;
    }

    .total-gols-box {
      text-align: center;
      font-size: 16px;
      font-weight: bold;
      color: #94a3b8;
      margin-bottom: 8px;
    }

    .total-gols-counter {
      font-size: 34px;
      color: #10b981;
      display: block;
      font-weight: 800;
    }

    .top-teams {
      font-size: 13px;
      border-top: 1px dashed #23324d;
      padding-top: 10px;
      margin-top: 6px;
    }

    .top-teams-title {
      color: #f59e0b;
      font-weight: bold;
      text-transform: uppercase;
      font-size: 11px;
      margin-bottom: 4px;
    }

    /* barra busca */
    .search-box {
      width: 100%;
      padding: 12px 15px;
      border-radius: 14px;
      border: 1px solid #23324d;
      background-color: #161f32;
      color: white;
      font-size: 15px;
      margin-bottom: 20px;
      outline: none;
    }

    .search-box:focus { border-color: #ef4444; }

    /* grupos */
    .group-section {
      background: #161f32;
      border-radius: 16px;
      padding: 15px;
      margin-bottom: 20px;
      border: 1px solid #23324d;
    }

    .group-title {
      font-size: 16px;
      font-weight: bold;
      color: #f59e0b;
      margin-bottom: 12px;
      border-bottom: 2px solid #23324d;
      padding-bottom: 5px;
      display: flex;
      justify-content: space-between;
    }

    .match-info {
      font-size: 12px;
      color: #94a3b8;
      font-weight: normal;
      background: #1e293b;
      padding: 2px 10px;
      border-radius: 30px;
    }

    .team-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 8px 0;
      border-bottom: 1px solid #1e293b;
      flex-wrap: wrap;
      gap: 4px;
    }

    .team-row:last-child { border-bottom: none; }

    .team-info {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }

    .team-name {
      font-size: 15px;
      font-weight: 500;
    }

    .match-datetime {
      font-size: 11px;
      background: #0b0f19;
      padding: 2px 10px;
      border-radius: 30px;
      color: #94a3b8;
      border: 1px solid #1e293b;
      white-space: nowrap;
    }

    .counter-controls {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .btn-counter {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      border: none;
      background: #23324d;
      color: white;
      font-size: 18px;
      font-weight: bold;
      cursor: pointer;
      display: flex;
      justify-content: center;
      align-items: center;
      transition: 0.15s;
    }

    .btn-counter:active { transform: scale(0.9); }
    .btn-plus { background: #ef4444; }

    .goals-display {
      font-size: 18px;
      font-weight: bold;
      width: 24px;
      text-align: center;
    }

    .auto-badge {
      background: #10b981;
      color: #0b0f19;
      font-size: 9px;
      font-weight: bold;
      padding: 2px 8px;
      border-radius: 20px;
      margin-left: 4px;
      text-transform: uppercase;
    }

    .match-clock-badge {
      background: #f59e0b;
      color: #0b0f19;
      font-size: 9px;
      font-weight: bold;
      padding: 2px 8px;
      border-radius: 20px;
      margin-left: 4px;
    }

    /* Painel de notificação de gol com jogador */
    .goal-notification {
      background: #1e293b;
      border-left: 4px solid #f59e0b;
      padding: 10px 14px;
      border-radius: 12px;
      margin-bottom: 15px;
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 14px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.6);
      transition: 0.2s;
      border: 1px solid #334155;
    }

    .goal-notification strong {
      color: #f59e0b;
    }

    .goal-notification .player-name {
      background: #0b0f19;
      padding: 2px 12px;
      border-radius: 30px;
      color: #10b981;
      font-weight: 600;
    }

    footer {
      font-size: 11px;
      text-align: center;
      color: #334155;
      margin-top: 8px;
    }
  </style>
</head>
<body>
<div class="app-container">
  <header>
    <h1>🏆 COPA DO MUNDO <span>2026</span></h1>
    <p style="color: #94a3b8; font-size: 12px; margin-top: 4px;">Gols com nome do jogador ⚡</p>
  </header>

  <!-- Relógio + Cronômetro -->
  <div class="clock-panel">
    <div class="digital-clock" id="liveClock">00:00:00</div>
    <div class="stopwatch-box">
      <div class="stopwatch-display" id="stopwatchDisplay">00:00</div>
      <div class="stopwatch-buttons">
        <button class="sw-btn start" id="swStart">▶</button>
        <button class="sw-btn stop" id="swStop">⏹</button>
        <button class="sw-btn reset" id="swReset">↺</button>
      </div>
    </div>
  </div>

  <!-- Notificação de gol -->
  <div id="goalNotification" class="goal-notification" style="display: none;">
    <span>⚽</span>
    <span><strong>GOL!</strong> <span id="goalScorer" class="player-name">—</span> (<span id="goalTeam">—</span>)</span>
  </div>

  <!-- Dashboard -->
  <div class="stats-dashboard">
    <div class="total-gols-box">
      ⚽ TOTAL DE GOLS
      <span class="total-gols-counter" id="global-counter">0</span>
    </div>
    <div class="top-teams">
      <div class="top-teams-title">⭐ Ataques Mais Positivos:</div>
      <div id="leaderboard-text" style="color: #94a3b8;">Nenhum gol marcado ainda.</div>
    </div>
  </div>

  <input type="text" id="search-input" class="search-box" placeholder="🔎 Buscar seleção..." oninput="filterTeams()">

  <div id="groups-wrapper"></div>
  <footer>⚡ Gols automáticos apenas no horário do jogo · Cada gol mostra o jogador</footer>
</div>

    // Lista de jogadores fictícios para cada seleção
    const playerNames = {
      "México": ["H. Lozano", "R. Jiménez", "E. Sánchez", "C. Montes"],
      "África do Sul": ["P. Tau", "T. Mokoena", "K. Dolly", "S. Zungu"],

      "Estados Unidos": ["C. Pulisic", "W. McKennie", "T. Weah", "B. Aaronson"],

      "Turquia": ["H. Çalhanoğlu", "C. Tosun", "Y. Yazıcı", "O. Kökçü"],

      "Suécia": ["A. Isak", "D. Kulusevski", "V. Claesson", "E. Forsberg"],

      "Bélgica": ["K. De Bruyne", "R. Lukaku", "J. Doku", "T. Castagne"],
      "Egito": ["M. Salah", "O. Marmoush", "T. Hamed", "M. Magdy"],
      "Irã": ["M. Taremi", "S. Azmoun", "A. Jahanbakhsh", "E. Hajsafi"],
      "Nova Zelândia": ["C. Wood", "L. Tuiloma", "J. Rojas", "M. Rogerson"],

      "Arábia Saudita": ["S. Al-Dawsari", "F. Al-Muwallad", "M. Al-Buraikan", "A. Al-Shehri"],
      "Uruguai": ["L. Suárez", "F. Valverde", "R. Araújo", "D. Núñez"],
      "França": ["K. Mbappé", "A. Griezmann", "M. Thuram", "O. Dembélé"],
      "Senegal": ["S. Mané", "I. Sarr", "P. Gueye", "N. Mendy"],

      "Noruega": ["E. Haaland", "M. Ødegaard", "A. Sørloth", "F. Aursnes"],
      "Argentina": ["L. Messi", "J. Álvarez", "A. Di María", "E. Fernández"],
      "Argélia": ["R. Mahrez", "I. Slimani", "Y. Belaili", "S. Feghouli"],
      "Áustria": ["M. Arnautović", "C. Baumgartner", "K. Laimer", "M. Sabitzer"],
      "Jordânia": ["M. Al-Dardour", "S. Al-Rashdan", "B. Al-Maharmeh", "A. Al-Saify"],
      "Portugal": ["C. Ronaldo", "B. Silva", "R. Leão", "J. Félix"],
      "RD do Congo": ["C. Bakambu", "Y. Bolasie", "N. Muleka", "G. Wissa"],
      "Uzbequistão": ["J. Shomurodov", "O. Urunov", "I. Alibaev", "E. Khamdamov"],
      "Colômbia": ["L. Díaz", "R. Borré", "J. Lerma", "D. Zapata"],
      "Inglaterra": ["H. Kane", "B. Saka", "J. Bellingham", "M. Rashford"],
      "Croácia": ["L. Modrić", "M. Kramarić", "J. Gvardiol", "I. Perišić"],
      "Gana": ["T. Partey", "A. Ayew", "M. Kudus", "I. Williams"],
      "Panamá": ["A. Godoy", "E. Díaz", "L. Quintero", "J. Rodríguez"]
    };

    // ---------- GOALS DATA (localStorage) ----------
    let goalsData = JSON.parse(localStorage.getItem('cup_2026_goals')) || {};
    // garantir todas as seleções
    Object.values(cupData).flat().forEach(item => {
      if (goalsData[item.team] === undefined) goalsData[item.team] = 0;
    });

    function saveToStorage() {
      localStorage.setItem('cup_2026_goals', JSON.stringify(goalsData));
      updateStats();
    }

    // ---------- NOTIFICAÇÃO DE GOL ----------
    function showGoalNotification(playerName, teamName) {
      const notif = document.getElementById('goalNotification');
      document.getElementById('goalScorer').innerText = playerName;
      document.getElementById('goalTeam').innerText = teamName;
      notif.style.display = 'flex';
      // esconde após 4 segundos
      clearTimeout(window.notifTimeout);
      window.notifTimeout = setTimeout(() => {
        notif.style.display = 'none';
      }, 4000);
    }

    // ---------- MODIFICAR GOLS (manual) ----------
    window.modifyGoals = function(teamName, amount) {
      let current = goalsData[teamName] || 0;
      let newValue = current + amount;
      if (newValue < 0) newValue = 0;
      goalsData[teamName] = newValue;
      const safeId = btoa(teamName).replace(/=/g, '');
      const el = document.getElementById(`goals-${safeId}`);
      if (el) el.innerText = newValue;
      
      // Se for incremento (gol) e não remoção, mostrar jogador
      if (amount > 0) {
        const players = playerNames[teamName] || ["Jogador"];
        const randomPlayer = players[Math.floor(Math.random() * players.length)];
        showGoalNotification(randomPlayer, teamName);
      }
      
      saveToStorage();
    };

    // ---------- GOL AUTOMÁTICO APENAS NA HORA DO JOGO ----------
    let autoGoalInterval = null;

    function isMatchTime(teamName) {
      const now = new Date();
      for (let group in cupData) {
        for (let item of cupData[group]) {
          if (item.team === teamName) {
            const [datePart, timePart] = item.datetime.split(' ');
            const [dayM, monthM] = datePart.split('/').map(Number);
            const [hourM, minM] = timePart.split(':').map(Number);
            const matchStart = new Date(2026, monthM-1, dayM, hourM, minM);
            const matchEnd = new Date(matchStart.getTime() + 90 * 60000);
            if (now >= matchStart && now <= matchEnd) return true;
          }
        }
      }
      return false;
    }

    function startAutoGoals() {
      if (autoGoalInterval) clearInterval(autoGoalInterval);
      autoGoalInterval = setInterval(() => {
        const allTeams = Object.values(cupData).flat().map(item => item.team);
        const eligibleTeams = allTeams.filter(team => isMatchTime(team));
        if (eligibleTeams.length === 0) return;
        const randomTeam = eligibleTeams[Math.floor(Math.random() * eligibleTeams.length)];
        if (randomTeam) {
          let current = goalsData[randomTeam] || 0;
          goalsData[randomTeam] = current + 1;
          const safeId = btoa(randomTeam).replace(/=/g, '');
          const el = document.getElementById(`goals-${safeId}`);
          if (el) el.innerText = goalsData[randomTeam];
          
          // Mostra jogador
          const players = playerNames[randomTeam] || ["Jogador"];
          const randomPlayer = players[Math.floor(Math.random() * players.length)];
          showGoalNotification(randomPlayer, randomTeam);
          
          saveToStorage();
          if (el) {
            el.style.transform = 'scale(1.5)';
            setTimeout(() => el.style.transform = 'scale(1)', 200);
          }
        }
      }, 9000);
    }

    function stopAutoGoals() {
      if (autoGoalInterval) {
        clearInterval(autoGoalInterval);
        autoGoalInterval = null;
      }
    }

    // ---------- CRONÔMETRO ----------
    let stopwatchInterval = null;
    let stopwatchSeconds = 0;

    function updateStopwatchDisplay() {
      const mins = String(Math.floor(stopwatchSeconds / 60)).padStart(2, '0');
      const secs = String(stopwatchSeconds % 60).padStart(2, '0');
      document.getElementById('stopwatchDisplay').innerText = `${mins}:${secs}`;
    }

    function startStopwatch() {
      if (stopwatchInterval) return;
      stopwatchInterval = setInterval(() => {
        stopwatchSeconds++;
        updateStopwatchDisplay();
      }, 1000);
    }

    function stopStopwatch() {
      if (stopwatchInterval) {
        clearInterval(stopwatchInterval);
        stopwatchInterval = null;
      }
    }

    function resetStopwatch() {
      stopStopwatch();
      stopwatchSeconds = 0;
      updateStopwatchDisplay();
    }

    // ---------- RELÓGIO DIGITAL ----------
    function updateClock() {
      const now = new Date();
      const h = String(now.getHours()).padStart(2, '0');
      const m = String(now.getMinutes()).padStart(2, '0');
      const s = String(now.getSeconds()).padStart(2, '0');
      document.getElementById('liveClock').innerText = `${h}:${m}:${s}`;
    }

    // ---------- UPDATE STATS ----------
    function updateStats() {
      let total = 0;
      let sorted = [];
      for (let team in goalsData) {
        total += goalsData[team];
        sorted.push({ name: team, goals: goalsData[team] });
      }
      document.getElementById('global-counter').innerText = total;

      sorted.sort((a, b) => b.goals - a.goals);
      let topThree = sorted.filter(t => t.goals > 0).slice(0, 3);
      const lb = document.getElementById('leaderboard-text');
      if (topThree.length === 0) {
        lb.innerText = "Nenhum gol marcado ainda.";
      } else {
        lb.innerHTML = topThree.map((t, idx) =>
          `<strong>${idx+1}º ${t.name}</strong> (${t.goals} ${t.goals === 1 ? 'gol' : 'gols'})`
        ).join(' | ');
      }
    }

    // ---------- BUILD APP ----------
    function buildAppStructure() {
      const wrapper = document.getElementById('groups-wrapper');
      wrapper.innerHTML = '';

      for (let group in cupData) {
        const section = document.createElement('div');
        section.className = 'group-section';
        section.id = `section-${group.replace(' ', '')}`;

        let groupHtml = `<div class="group-title">${group} <span class="match-info">📅 jogos</span></div>`;

        cupData[group].forEach(item => {
          const team = item.team;
          const datetime = item.datetime || '--/-- --:--';
          const safeId = btoa(team).replace(/=/g, '');
          const currentGoals = goalsData[team] || 0;

          groupHtml += `
            <div class="team-row" data-team="${team.toLowerCase()}">
              <div class="team-info">
                <span class="team-name">${team}</span>
                <span class="match-datetime">🕒 ${datetime}</span>
                <span class="auto-badge">⚡auto</span>
                <span class="match-clock-badge">⏳ jogo</span>
              </div>
              <div class="counter-controls">
                <button class="btn-counter" onclick="modifyGoals('${team}', -1)">−</button>
                <span class="goals-display" id="goals-${safeId}">${currentGoals}</span>
                <button class="btn-counter btn-plus" onclick="modifyGoals('${team}', 1)">+</button>
              </div>
            </div>
          `;
        });

        section.innerHTML = groupHtml;
        wrapper.appendChild(section);
      }
      updateStats();
    }

    // ---------- FILTRO ----------
    window.filterTeams = function() {
      const query = document.getElementById('search-input').value.toLowerCase().trim();
      const rows = document.querySelectorAll('.team-row');
      rows.forEach(row => {
        const name = row.getAttribute('data-team');
        row.style.display = name.includes(query) ? 'flex' : 'none';
      });
      for (let group in cupData) {
        const gId = `section-${group.replace(' ', '')}`;
        const section = document.getElementById(gId);
        if (section) {
          const visible = section.querySelectorAll('.team-row[style*="display: flex"]');
          section.style.display = (visible.length === 0 && query !== '') ? 'none' : 'block';
        }
      }
    };

    // ---------- INICIALIZAÇÃO ----------
    window.onload = function() {
      buildAppStructure();
      updateClock();
      setInterval(updateClock, 1000);
      startAutoGoals();
      document.getElementById('swStart').addEventListener('click', startStopwatch);
      document.getElementById('swStop').addEventListener('click', stopStopwatch);
      document.getElementById('swReset').addEventListener('click', resetStopwatch);
      window.addEventListener('beforeunload', function() {
        stopAutoGoals();
        stopStopwatch();
      });
    };
  })();
</script>
</body>
</html>
